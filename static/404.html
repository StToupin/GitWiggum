<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 – Page Not Found</title>
    <link rel="icon" href="/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        --gitWiggum-error-bg: #0d1117;
        --gitWiggum-error-surface: rgba(6, 11, 21, 0.8);
        --gitWiggum-error-border: rgba(255, 255, 255, 0.08);
        --gitWiggum-error-muted: #98a2b3;
        --gitWiggum-error-accent: #f6ad55;
        --gitWiggum-error-gutter: clamp(0.75rem, 2vw, 1.5rem);
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(246, 173, 85, 0.24), transparent 30%),
          radial-gradient(circle at top right, rgba(56, 189, 248, 0.16), transparent 26%),
          linear-gradient(180deg, #111827 0%, var(--gitWiggum-error-bg) 50%, #090c10 100%);
        color: #f8fafc;
        font-family: "Instrument Sans", "Inter", "Segoe UI", sans-serif;
        overflow-x: hidden;
      }

      .gitWiggum-error-shell {
        width: 100%;
        min-height: 100dvh;
        padding: var(--gitWiggum-error-gutter);
      }

      .gitWiggum-error-frame {
        width: 100%;
        min-height: calc(100dvh - (var(--gitWiggum-error-gutter) * 2));
      }

      .gitWiggum-error-card {
        width: 100%;
        min-height: 100%;
        background: var(--gitWiggum-error-surface);
        border: 1px solid var(--gitWiggum-error-border);
        border-radius: 2rem;
        box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.32);
        overflow: hidden;
      }

      .gitWiggum-error-card .row {
        min-height: 100%;
      }

      .gitWiggum-error-copy {
        max-width: 32rem;
      }

      .gitWiggum-error-content {
        height: 100%;
      }

      .gitWiggum-error-eyebrow {
        color: var(--gitWiggum-error-accent);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .gitWiggum-error-title {
        font-size: clamp(2.4rem, 5vw, 4.8rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 0.95;
      }

      .gitWiggum-error-lead {
        color: var(--gitWiggum-error-muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .gitWiggum-marmot-panel {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 100%;
        padding: 2rem;
        background:
          radial-gradient(circle at top, rgba(246, 173, 85, 0.16), transparent 42%),
          rgba(255, 255, 255, 0.02);
      }

      .gitWiggum-marmot-panel::after {
        content: "";
        position: absolute;
        inset: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 1.5rem;
        pointer-events: none;
      }

      .gitWiggum-marmot {
        width: min(100%, 22rem);
        filter: drop-shadow(0 1.4rem 2rem rgba(0, 0, 0, 0.26));
        animation: gitWiggum-float 3.8s ease-in-out infinite;
      }

      .gitWiggum-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.85rem;
        border-radius: 999px;
        background: rgba(246, 173, 85, 0.12);
        color: #fff3da;
        font-size: 0.95rem;
      }

      .gitWiggum-chip::before {
        content: "";
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 999px;
        background: var(--gitWiggum-error-accent);
        box-shadow: 0 0 0 0.3rem rgba(246, 173, 85, 0.12);
      }

      .btn-gitWiggum-back {
        --bs-btn-color: #f8fafc;
        --bs-btn-border-color: rgba(255, 255, 255, 0.18);
        --bs-btn-hover-color: #ffffff;
        --bs-btn-hover-border-color: rgba(255, 255, 255, 0.32);
        --bs-btn-hover-bg: rgba(255, 255, 255, 0.05);
        --bs-btn-active-bg: rgba(255, 255, 255, 0.08);
        --bs-btn-active-border-color: rgba(255, 255, 255, 0.28);
      }

      @keyframes gitWiggum-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      @media (max-width: 991.98px) {
        .gitWiggum-error-shell {
          padding: 0;
        }

        .gitWiggum-error-frame {
          min-height: 100dvh;
        }

        .gitWiggum-error-card {
          border-radius: 0;
          border-left: 0;
          border-right: 0;
          min-height: 100dvh;
        }

        .gitWiggum-marmot-panel {
          min-height: 18rem;
          padding: 1.5rem 1rem;
        }

        .gitWiggum-error-content {
          padding: 1.25rem 1.5rem 1.5rem !important;
        }
      }

      @media (max-width: 575.98px) {
        .gitWiggum-marmot-panel {
          min-height: 16rem;
          padding: 1rem 0.75rem;
        }

        .gitWiggum-marmot {
          width: min(68vw, 15rem);
        }

        .gitWiggum-error-content {
          padding: 1rem 1.25rem 1.25rem !important;
        }

        .gitWiggum-error-title {
          font-size: clamp(2rem, 12vw, 3rem);
        }

        .gitWiggum-error-lead {
          font-size: 1rem;
          line-height: 1.55;
        }
      }
    </style>
  </head>
  <body>
    <main class="gitWiggum-error-shell d-flex align-items-stretch">
      <div class="gitWiggum-error-frame d-flex align-items-stretch">
        <section class="gitWiggum-error-card">
          <div class="row g-0 align-items-stretch h-100">
            <div class="col-lg-5">
              <div class="gitWiggum-marmot-panel">
                  <svg
                    role="img"
                    aria-label="Friendly lost marmot"
                    viewBox="0 0 300 300"
                    class="gitWiggum-marmot"
                  >
                    <defs>
                      <linearGradient id="fur" x1="0" x2="1" y1="0" y2="1">
                        <stop offset="0%" stop-color="#c49a6c" />
                        <stop offset="100%" stop-color="#a97644" />
                      </linearGradient>
                      <linearGradient id="belly" x1="0" x2="0" y1="0" y2="1">
                        <stop offset="0%" stop-color="#f2e3d3" />
                        <stop offset="100%" stop-color="#e8d4bf" />
                      </linearGradient>
                    </defs>
                    <!-- shadow -->
                    <ellipse cx="150" cy="240" rx="75" ry="14" fill="#000" opacity="0.06" />
                    <!-- body -->
                    <ellipse cx="150" cy="160" rx="90" ry="105" fill="url(#fur)" />
                    <!-- belly patch -->
                    <ellipse cx="150" cy="185" rx="55" ry="70" fill="url(#belly)" />
                    <!-- ears -->
                    <circle cx="98" cy="67" r="18" fill="#a97644" />
                    <circle cx="202" cy="67" r="18" fill="#a97644" />
                    <!-- head -->
                    <ellipse cx="150" cy="95" rx="70" ry="55" fill="url(#fur)" />
                    <!-- eyes (looking to side, a bit confused) -->
                    <circle cx="128" cy="95" r="10" fill="#fff" />
                    <circle cx="172" cy="95" r="10" fill="#fff" />
                    <circle cx="132" cy="95" r="4.5" fill="#111827" />
                    <circle cx="176" cy="95" r="4.5" fill="#111827" />
                    <!-- brows (soft, raised) -->
                    <path d="M114 82 q14 -10 28 0" stroke="#7c4f2b" stroke-width="5" fill="none" stroke-linecap="round" />
                    <path d="M158 82 q14 -10 28 0" stroke="#7c4f2b" stroke-width="5" fill="none" stroke-linecap="round" />
                    <!-- nose -->
                    <ellipse cx="150" cy="112" rx="12" ry="8" fill="#3f3d56" />
                    <!-- mouth line -->
                    <path d="M150 120 v10" stroke="#3f3d56" stroke-width="3" stroke-linecap="round" />
                    <!-- teeth -->
                    <rect x="142" y="128" width="8" height="12" rx="2" fill="#fff" />
                    <rect x="150" y="128" width="8" height="12" rx="2" fill="#fff" />
                    <!-- whiskers -->
                    <path d="M110 120 h26" stroke="#7c4f2b" stroke-width="3" stroke-linecap="round" opacity=".8" />
                    <path d="M110 128 h26" stroke="#7c4f2b" stroke-width="3" stroke-linecap="round" opacity=".6" />
                    <path d="M110 136 h26" stroke="#7c4f2b" stroke-width="3" stroke-linecap="round" opacity=".4" />
                    <path d="M164 120 h26" stroke="#7c4f2b" stroke-width="3" stroke-linecap="round" opacity=".8" />
                    <path d="M164 128 h26" stroke="#7c4f2b" stroke-width="3" stroke-linecap="round" opacity=".6" />
                    <path d="M164 136 h26" stroke="#7c4f2b" stroke-width="3" stroke-linecap="round" opacity=".4" />
                    <!-- arms/paws -->
                    <ellipse cx="95" cy="175" rx="22" ry="18" fill="#a97644" />
                    <ellipse cx="205" cy="175" rx="22" ry="18" fill="#a97644" />
                    <!-- small signpost with question mark to emphasize "lost" -->
                    <g opacity="0.9">
                      <rect x="30" y="155" width="8" height="65" rx="3" fill="#b45309" />
                      <path d="M18 165 h48 l-10 16 h-48 z" fill="#f59e0b" />
                      <text x="42" y="177" text-anchor="middle" font-size="16" font-family="ui-sans-serif, system-ui, -apple-system" fill="#1f2937">?</text>
                    </g>
                  </svg>
              </div>
            </div>
            <div class="col-lg-7">
              <div class="gitWiggum-error-content h-100 d-flex align-items-center p-4 p-md-5 p-xl-6 text-center text-lg-start">
                <div class="gitWiggum-error-copy mx-auto mx-lg-0">
                  <p class="gitWiggum-error-eyebrow mb-3">Error 404</p>
                  <h1 class="gitWiggum-error-title mb-4">Oops. This page is lost.</h1>
                  <p class="gitWiggum-error-lead mb-4">
                    The page you’re looking for doesn’t exist anymore, moved somewhere else, or the link is broken.
                  </p>
                  <p class="gitWiggum-chip mb-4 mb-lg-5">gitWiggum could not match this route</p>
                  <div class="d-grid gap-3 d-sm-flex justify-content-center justify-content-lg-start">
                    <a href="/" class="btn btn-warning btn-lg px-4" data-posthog-id="error-404-go-home">Go to homepage</a>
                    <a href="/" onclick="history.back(); return false;" class="btn btn-outline-light btn-gitWiggum-back btn-lg px-4" data-posthog-id="error-404-go-back">
                        Go back
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
